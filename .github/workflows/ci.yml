name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Lint with ruff
      run: |
        ruff check src/ tests/
    
    - name: Format check with black
      run: |
        black --check src/ tests/
    
    - name: Type check with mypy
      run: |
        mypy src/
    
    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  demo-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: 3.10
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Test demo imports
      run: |
        python -c "import streamlit; print('Streamlit import successful')"
        python -c "from demo.streamlit_demo import *; print('Demo imports successful')"
    
    - name: Test basic model functionality
      run: |
        python -c "
        from src.pathological_speech_recognition.models import ConformerPathologicalSpeechModel
        from omegaconf import DictConfig
        
        config = DictConfig({
            'encoder_dim': 144,
            'num_encoder_layers': 2,
            'num_attention_heads': 4,
            'vocab_size': 32,
            'blank_id': 0,
            'sos_id': 1,
            'eos_id': 2,
            'pad_id': 3
        })
        
        model = ConformerPathologicalSpeechModel(config)
        print('Model creation successful')
        
        import torch
        input_values = torch.randn(1, 100, 80)
        with torch.no_grad():
            outputs = model(input_values)
        print('Model inference successful')
        "

  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: 3.10
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: |
        python -m build
    
    - name: Check package
      run: |
        twine check dist/*
